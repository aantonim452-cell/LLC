<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Riwayat Transaksi | LLC PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #ffffff; min-height: 100vh; }
        
        .bg-master { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; overflow: hidden; }
        .nebula-1 { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #000); animation: pulseNebula 8s ease-in-out infinite; }
        .nebula-2 { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 80% 70%, #1a0a2a, transparent); animation: pulseNebula2 10s ease-in-out infinite alternate; }
        @keyframes pulseNebula { 0%,100%{opacity:0.6;}50%{opacity:1;} }
        @keyframes pulseNebula2 { 0%{transform:scale(1);opacity:0.4;}100%{transform:scale(1.2);opacity:0.8;} }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding: 12px 20px; background: rgba(15,25,45,0.5); backdrop-filter: blur(12px); border-radius: 50px; border: 1px solid rgba(245,158,11,0.2); }
        .back-btn { background: rgba(245,158,11,0.2); border: none; width: 40px; height: 40px; border-radius: 50%; color: #fbbf24; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        .back-btn:hover { background: #f59e0b; color: #000; transform: scale(1.05); }
        .logo-small { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .card { background: rgba(15,25,45,0.6); backdrop-filter: blur(15px); border-radius: 1.5rem; border: 1px solid rgba(245,158,11,0.25); overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 16px 20px; background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.98)); border-bottom: 2px solid #f59e0b; }
        .card-header h2 { color: #fbbf24; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        
        .riwayat-list { padding: 10px; }
        .riwayat-item { background: rgba(0,0,0,0.3); border-radius: 1rem; padding: 15px; margin-bottom: 10px; border-left: 3px solid #f59e0b; transition: 0.2s; }
        .riwayat-item:hover { background: rgba(245,158,11,0.1); transform: translateX(5px); }
        .riwayat-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .game-name { font-weight: 700; color: #fbbf24; }
        .tanggal { font-size: 10px; color: #94a3b8; }
        .riwayat-detail { display: flex; flex-wrap: wrap; gap: 15px; font-size: 12px; margin-top: 8px; }
        .detail-item span:first-child { color: #94a3b8; }
        .detail-item span:last-child { color: white; font-weight: 500; }
        .status { padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .status-proses { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .status-selesai { background: rgba(34,197,94,0.2); color: #22c55e; }
        .status-gagal { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #f59e0b; opacity: 0.5; }
        
        .btn-hapus { background: rgba(239,68,68,0.2); border: none; padding: 8px 16px; border-radius: 30px; color: #ef4444; font-size: 12px; cursor: pointer; margin-top: 10px; transition: 0.2s; width: 100%; }
        .btn-hapus:hover { background: #ef4444; color: white; }
        
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
    <div class="bg-master"><div class="nebula-1"></div><div class="nebula-2"></div></div>
    
    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="window.location.href='../index.html'"><i class="fas fa-arrow-left"></i></button>
            <div class="logo-small"><i class="fas fa-crown"></i> LLC PREMIUM</div>
            <div style="flex:1"></div>
            <button class="back-btn" onclick="hapusSemuaRiwayat()" style="background:rgba(239,68,68,0.2);"><i class="fas fa-trash-alt"></i></button>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-history"></i> Riwayat Transaksi</h2>
            </div>
            <div class="riwayat-list" id="riwayatList">
                <div class="empty-state"><i class="fas fa-receipt"></i><p>Belum ada riwayat transaksi</p></div>
            </div>
        </div>
        
        <div class="footer">© 2026 LLC PREMIUM - Semua transaksi tersimpan di device Anda</div>
    </div>
    
    <script>
        function formatRupiah(angka) { return "Rp " + angka.toLocaleString('id-ID'); }
        
        function loadRiwayat() {
            let riwayat = JSON.parse(localStorage.getItem('llc_riwayat') || '[]');
            let container = document.getElementById('riwayatList');
            if(riwayat.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><p>Belum ada riwayat transaksi</p></div>';
                return;
            }
            let html = '';
            for(let i=0; i<riwayat.length; i++) {
                let r = riwayat[i];
                let statusClass = 'status-proses';
                let statusText = '⏳ Proses';
                if(r.status === 'selesai') { statusClass = 'status-selesai'; statusText = '✅ Selesai'; }
                if(r.status === 'gagal') { statusClass = 'status-gagal'; statusText = '❌ Gagal'; }
                html += `
                    <div class="riwayat-item">
                        <div class="riwayat-header">
                            <span class="game-name"><i class="fas fa-gamepad"></i> ${r.game || '-'}</span>
                            <span class="tanggal"><i class="far fa-calendar-alt"></i> ${r.tanggal || '-'}</span>
                            <span class="${statusClass}">${statusText}</span>
                        </div>
                        <div class="riwayat-detail">
                            <div class="detail-item"><span>Jenis:</span> <span>${r.jenis || '-'}</span></div>
                            <div class="detail-item"><span>Jumlah:</span> <span>${r.jumlah || '-'}</span></div>
                            <div class="detail-item"><span>ID Game:</span> <span>${r.idGame || '-'}</span></div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function hapusSemuaRiwayat() {
            if(confirm('Hapus semua riwayat transaksi?')) {
                localStorage.removeItem('llc_riwayat');
                loadRiwayat();
                showToast('Semua riwayat dihapus');
            }
        }
        
        function showToast(msg) {
            let toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#1e293b';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '50px';
            toast.style.zIndex = '1000';
            toast.style.borderLeft = '4px solid #f59e0b';
            toast.style.fontSize = '13px';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        loadRiwayat();
    </script>
</body>
</html>
