<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LLC Store | TopUp Higgs & Domino Sultan | Berfist - Chat APK Langsung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === SEMUA CSS ASLI TIDAK DIUBAH === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            color: #f1f5f9;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* --- POTONG: SELURUH CSS ASLI TETAP SAMA --- */
    </style>
</head>

<body>
<canvas id="particleCanvas" class="particle-canvas"></canvas>
<div class="stars"></div>
<div class="twinkling"></div>

<div class="container">
    <!-- === SEMUA HTML ASLI TIDAK DIUBAH === -->
    <!-- (Hero, Card, Modal, Table, dll tetap sama persis) -->

    <!-- ================= SCRIPT ================= -->
    <script>
        const DOWNLOAD_LINKS = {
            higgs: "https://github.com/llcstore92-lab/LLC_STORE/releases/download/updatedx/sock1.zip",
            bosDomino: "https://github.com/llcstore92-lab/LLC_STORE/releases/download/updatedx/sock1.zip",
            royalDomino: "https://github.com/llcstore92-lab/LLC_STORE/releases/download/updatedx/sock1.zip",
            berfist: "https://github.com/llcstore92-lab/LLC_STORE/releases/download/updatedx/sock1.zip"
        };

        let currentSelectedGame = "";

        function downloadGame(gameKey) {
            const link = DOWNLOAD_LINKS[gameKey];
            if (link) window.open(link, "_blank");
            else alert("Link download belum tersedia.");
        }

        function openModalWithGame(gameName) {
            currentSelectedGame = gameName;
            document.getElementById("gameNameDisplay").value = gameName;
            document.getElementById("orderForm").reset();
            updatePreview();
            document.getElementById("orderModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("orderModal").style.display = "none";
        }

        function updatePreview() {
            const game = document.getElementById("gameNameDisplay").value || "-";
            const type = document.getElementById("transaksiType").value || "-";
            const jumlah = document.getElementById("jumlahKoin").value || "-";
            const userId = document.getElementById("idGame").value || "-";
            const bank = document.getElementById("bankTransfer").value || "-";

            document.getElementById("previewPesan").innerText =
`🛒 ORDER LLC STORE

🎮 Game: ${game}
📌 Jenis: ${type}
💰 Jumlah: ${jumlah}
🆔 ID Game: ${userId}
🏦 Pembayaran: ${bank}`;
        }

        /* =========================
           PERBAIKAN UTAMA DI SINI
           ========================= */
        function sendOrderToAPK() {
            const game = document.getElementById("gameNameDisplay").value.trim();
            const type = document.getElementById("transaksiType").value;
            const jumlah = document.getElementById("jumlahKoin").value.trim();
            const userId = document.getElementById("idGame").value.trim();
            const bank = document.getElementById("bankTransfer").value.trim();

            if (!type || !jumlah || !userId || !bank) {
                alert("❌ Lengkapi semua data terlebih dahulu.");
                return;
            }

            const message =
`🛒 ORDER LLC STORE 🛒

🎮 Game: ${game}
📌 Jenis: ${type}
💰 Jumlah: ${jumlah}
🆔 ID Game: ${userId}
🏦 Pembayaran: ${bank}
⏰ Mohon diproses.`;

            // 🔐 BACKUP (ANTI HILANG)
            localStorage.setItem("llc_last_order", message);

            try {
                if (window.Android && typeof window.Android.sendMessageToAdmin === "function") {
                    window.Android.sendMessageToAdmin(message);
                    localStorage.removeItem("llc_last_order");
                    alert("✅ Pesan berhasil dikirim ke Admin.");
                } else {
                    alert("⚠️ APK tidak terdeteksi.\nPesan disimpan otomatis.");
                }
            } catch (e) {
                console.error("Gagal kirim:", e);
                alert("❌ Terjadi kesalahan.\nPesan disimpan otomatis.");
            }

            closeModal();
            console.log("ORDER:", message);
        }

        // === PARTIKEL & EVENT ASLI TETAP ===
        window.onclick = function(e) {
            if (e.target === document.getElementById("orderModal")) closeModal();
        };
    </script>
</div>
</body>
</html>
